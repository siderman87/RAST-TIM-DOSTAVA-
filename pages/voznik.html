<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voznik</title>
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
<div class="container">
  <h1 id="imeVoznika">Voznik</h1>
  <p>Moje dostave</p>

  <div id="mojeDostave"></div>

  <a class="btn" href="../index.html">Odjava</a>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
let dostave = JSON.parse(localStorage.getItem("dostave")) || [];

if (user) {
  document.getElementById("imeVoznika").innerText = user.name;
}

function prikaziMojeDostave() {
  const mojeDostave = document.getElementById("mojeDostave");

  const moje = dostave
    .map((d, index) => ({ ...d, originalIndex: index }))
    .filter(d => String(d.voznik).toUpperCase() === String(user.name).toUpperCase());

  if (moje.length === 0) {
    mojeDostave.innerHTML = "<p>Trenutno nimaš dodeljenih dostav.</p>";
    return;
  }

  let html = "";

  moje.forEach(d => {
    html += `
      <div class="delivery">
        <h3>${d["Stranka"] || "Brez stranke"}</h3>
        <p><b>Lokacija:</b> ${d["Lokacija dostave"] || ""}</p>
        <p><b>Vrednost:</b> ${d["Vrednost"] || ""}</p>
        <p><b>Status:</b> ${d["Status"] || "Pripravljeno"}</p>

        <button onclick="spremeniStatus(${d.originalIndex}, 'Na poti')">Na poti</button>
        <button onclick="spremeniStatus(${d.originalIndex}, 'Dostavljeno')">Dostavljeno</button>
      </div>
    `;
  });

  mojeDostave.innerHTML = html;
}

function spremeniStatus(index, status) {
  dostave[index].Status = status;
  dostave[index].cas_spremembe = new Date().toLocaleString("sl-SI");

  localStorage.setItem("dostave", JSON.stringify(dostave));

  alert("Status spremenjen v: " + status);

  prikaziMojeDostave();
}

prikaziMojeDostave();
</script>

</body>
</html>
