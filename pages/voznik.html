<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voznik</title>
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
<div class="container">
  <h1 id="imeVoznika">Voznik</h1>
  <p>Moje dostave</p>

  <a class="btn" href="pot-voznik.html">🗺️ Moja pot</a>

  <div id="mojeDostave"></div>

  <a class="btn" href="../index.html">Odjava</a>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
let dostave = JSON.parse(localStorage.getItem("dostave")) || [];

if (!user) {
  document.getElementById("imeVoznika").innerText = "Nisi prijavljen";
} else {
  document.getElementById("imeVoznika").innerText = user.name;
}

function statusClass(status) {
  if (status === "Dostavljeno") return "status-dostavljeno";
  if (status === "Na poti") return "status-napoti";
  return "status-pripravljeno";
}

function prikaziMojeDostave() {
  const box = document.getElementById("mojeDostave");

  if (!user) {
    box.innerHTML = "<p>Najprej se prijavi.</p>";
    return;
  }

  let moje = dostave
    .map((d, index) => ({ ...d, originalIndex: index }))
    .filter(d =>
      String(d.voznik || "").toUpperCase().trim() ===
      String(user.name || "").toUpperCase().trim()
    );

  if (moje.length === 0) {
    box.innerHTML = "<p>Trenutno nimaš dodeljenih dostav.</p>";
    return;
  }

  let html = "";

  moje.forEach(d => {
    const status = d["Status"] || "Pripravljeno";

    html += `
      <div class="delivery">
        <h3>${d["Stranka"] || "Brez stranke"}</h3>

        <p><b>Lokacija:</b> ${d["Lokacija dostave"] || ""}</p>
        <p><b>Vrednost:</b> ${d["Vrednost"] || ""}</p>
        <p><b>Status:</b> <span class="${statusClass(status)}">${status}</span></p>
        <p><b>Čas:</b> ${d["cas_spremembe"] || "-"}</p>
        <p><b>Prejemnik:</b> ${d["prejemnik"] || "-"}</p>

        <button onclick="spremeniStatus(${d.originalIndex}, 'Na poti')">Na poti</button>
        <button onclick="spremeniStatus(${d.originalIndex}, 'Dostavljeno')">Dostavljeno</button>
        <button onclick="odpriDobavnico(${d.originalIndex})">📄 Dobavnica</button>
      </div>
    `;
  });

  box.innerHTML = html;
}

function spremeniStatus(index, status) {
  dostave[index].Status = status;
  dostave[index].cas_spremembe = new Date().toLocaleString("sl-SI");

  localStorage.setItem("dostave", JSON.stringify(dostave));

  prikaziMojeDostave();
}

function odpriDobavnico(index) {
  localStorage.setItem("izbranaDobavnica", index);
  window.location.href = "dobavnica.html";
}

prikaziMojeDostave();
</script>

</body>
</html>
