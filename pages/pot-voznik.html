<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moja pot</title>
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
<div class="container">
  <h1>🗺️ Moja pot</h1>
  <p><b>Start:</b> Vesca 18, 1217 Vodice</p>

  <div id="rezultat"></div>

  <a class="btn" href="voznik.html">Nazaj</a>
</div>

<script>
const START_NASLOV = "Vesca 18, 1217 Vodice, Slovenija";

const user = JSON.parse(localStorage.getItem("user"));
const dostave = JSON.parse(localStorage.getItem("dostave")) || [];
const stranke = JSON.parse(localStorage.getItem("stranke")) || [];

function normaliziraj(text) {
  return String(text || "")
    .toUpperCase()
    .replace(/\s+/g, " ")
    .trim();
}

function najdiPolniNaslov(imeStranke) {
  const najdena = stranke.find(s =>
    normaliziraj(s.Stranka) === normaliziraj(imeStranke)
  );

  if (najdena && najdena["Polni naslov"]) {
    return najdena["Polni naslov"];
  }

  return "";
}

function statusClass(status) {
  if (status === "Dostavljeno") return "status-dostavljeno";
  if (status === "Na poti") return "status-napoti";
  return "status-pripravljeno";
}

function pocakaj(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function geocode(naslov) {
  const cacheKey = "geo_" + naslov;
  const cached = localStorage.getItem(cacheKey);

  if (cached) {
    return JSON.parse(cached);
  }

  const url =
    "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" +
    encodeURIComponent(naslov);

  const res = await fetch(url);
  const data = await res.json();

  await pocakaj(1100);

  if (!data || data.length === 0) {
    return null;
  }

  const lokacija = {
    lat: parseFloat(data[0].lat),
    lon: parseFloat(data[0].lon)
  };

  localStorage.setItem(cacheKey, JSON.stringify(lokacija));

  return lokacija;
}

function googleMapsLink(tocke) {
  const cilj = tocke[tocke.length - 1].naslov;
  const vmesne = tocke.slice(1, -1).map(t => t.naslov).join("|");

  let url =
    "https://www.google.com/maps/dir/?api=1" +
    "&origin=" + encodeURIComponent(START_NASLOV) +
    "&destination=" + encodeURIComponent(cilj) +
    "&travelmode=driving";

  if (vmesne) {
    url += "&waypoints=" + encodeURIComponent(vmesne);
  }

  return url;
}

async function izracunajMojoPot() {
  const rezultat = document.getElementById("rezultat");

  if (!user) {
    rezultat.innerHTML = "<p>Nisi prijavljen.</p>";
    return;
  }

  rezultat.innerHTML = "<p>Računam tvojo pot...</p>";

  let moje = dostave.filter(d =>
    normaliziraj(d.voznik) === normaliziraj(user.name)
  );

  if (moje.length === 0) {
    rezultat.innerHTML = "<p>Nimaš dodeljenih dostav.</p>";
    return;
  }

  let tocke = [];
  let brezNaslova = [];

  const start = await geocode(START_NASLOV);

  if (!start) {
    rezultat.innerHTML = "<p>Ne najdem startnega naslova.</p>";
    return;
  }

  tocke.push({
    id: "START",
    tip: "START",
    stranka: "START",
    naslov: START_NASLOV,
    status: "",
    lat: start.lat,
    lon: start.lon
  });

  for (const d of moje) {
    const ime = d["Stranka"] || "Brez stranke";
    const polniNaslov = najdiPolniNaslov(ime);

    let moznaIskanja = [];

    if (polniNaslov) {
      moznaIskanja.push(polniNaslov);
      moznaIskanja.push(polniNaslov + ", Slovenija");
    }

    moznaIskanja.push(ime + ", Slovenija");

    if (d["Lokacija dostave"]) {
      moznaIskanja.push(d["Lokacija dostave"] + ", Slovenija");
    }

    let geo = null;
    let uporabljenNaslov = "";

    for (const naslov of moznaIskanja) {
      geo = await geocode(naslov);

      if (geo) {
        uporabljenNaslov = naslov;
        break;
      }
    }

    if (!geo) {
      brezNaslova.push(ime + " - ni najdene lokacije");
      continue;
    }

    tocke.push({
      id: normaliziraj(ime + "|" + uporabljenNaslov),
      tip: "DOSTAVA",
      stranka: ime,
      naslov: uporabljenNaslov,
      status: d["Status"] || "Pripravljeno",
      lat: geo.lat,
      lon: geo.lon
    });
  }

  if (tocke.length < 2) {
    rezultat.innerHTML = `
      <p>Ni dovolj naslovov za optimizacijo.</p>
      <p>${brezNaslova.join("<br>")}</p>
    `;
    return;
  }

  let urejeno = [];
  let opozorilo = "";

  try {
    const koordinate = tocke.map(t => `${t.lon},${t.lat}`).join(";");

    const osrmUrl =
      "https://router.project-osrm.org/trip/v1/driving/" +
      koordinate +
      "?source=first&roundtrip=false&overview=false";

    const res = await fetch(osrmUrl);
    const data = await res.json();

    if (data && data.code === "Ok" && data.waypoints) {
      urejeno = data.waypoints
        .map((w, i) => ({
          ...tocke[i],
          vrstniRed: w.waypoint_index
        }))
        .sort((a, b) => a.vrstniRed - b.vrstniRed);

      const zeNotri = urejeno.map(t => t.id);
      const manjkajoce = tocke.filter(t => !zeNotri.includes(t.id));

      if (manjkajoce.length > 0) {
        urejeno = [...urejeno, ...manjkajoce];
        opozorilo = "Nekatere točke niso bile optimalno razporejene in so dodane na konec.";
      }
    } else {
      urejeno = tocke;
      opozorilo = "Optimizacija ni uspela, zato je prikazan osnovni vrstni red.";
    }
  } catch (e) {
    urejeno = tocke;
    opozorilo = "Napaka pri optimizaciji, zato je prikazan osnovni vrstni red.";
  }

  const mapsUrl = googleMapsLink(urejeno);

  let html = `
    <div class="delivery">
      <h2>${user.name} - moja pot</h2>
      <a class="btn" target="_blank" href="${mapsUrl}">▶ Začni navigacijo</a>
    </div>
  `;

  if (opozorilo) {
    html += `<div class="stats">⚠️ ${opozorilo}</div>`;
  }

  urejeno.forEach((t, i) => {
    html += `
      <div class="route-card">
        <div class="route-number">${i + 1}</div>
        <div class="route-content">
          <h3>${t.tip === "START" ? "START - Vesca 18" : t.stranka}</h3>
          <p>📍 ${t.naslov}</p>
          ${
            t.status
            ? `<p>Status: <span class="${statusClass(t.status)}">${t.status}</span></p>`
            : ""
          }
        </div>
      </div>
    `;
  });

  if (brezNaslova.length > 0) {
    html += `
      <div class="delivery">
        <h3>⚠️ Stranke brez najdene lokacije</h3>
        <p>${brezNaslova.join("<br>")}</p>
      </div>
    `;
  }

  rezultat.innerHTML = html;
}

izracunajMojoPot();
</script>

</body>
</html>
