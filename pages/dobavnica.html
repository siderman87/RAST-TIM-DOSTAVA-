          </div>
        </div>

        <div class="party-grid">
          <fieldset class="card">
            <legend>Dobavitelj</legend>
            <label>
              Naziv
              <input id="supplier-name" />
            </label>
            <label>
              Naslov
              <input id="supplier-address" />
            </label>
            <div class="two-columns">
              <label>
                Pošta
                <input id="supplier-post" />
              </label>
              <label>
                ID za DDV
                <input id="supplier-vat" />
              </label>
            </div>
            <label>
              TRR
              <input id="supplier-iban" />
            </label>
          </fieldset>

          <fieldset class="card">
            <legend>Prejemnik</legend>
            <label>
              Naziv
              <input id="customer-name" />
            </label>
            <label>
              Naslov
              <input id="customer-address" />
            </label>
            <label>
              Pošta
              <input id="customer-post" />
            </label>
          </fieldset>
        </div>

        <div class="meta-grid card">
          <label>
            Kraj
            <input id="place" />
          </label>
          <label>
            Datum
            <input id="issue-date" type="date" />
          </label>
          <label>
            Datum odpreme
            <input id="dispatch-date" type="date" />
          </label>
          <label>
            Fakturiral/a
            <input id="issued-by" />
          </label>
          <label class="wide-field">
            Blago dobavlja
            <input id="warehouse" />
          </label>
        </div>

        <div class="table-toolbar">
          <h3>Postavke</h3>
          <button class="button button-secondary" id="add-item" type="button">
            + Dodaj postavko
          </button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">EAN / šifra</th>
                <th scope="col">Naziv</th>
                <th scope="col">Količina</th>
                <th scope="col">Cena brez DDV</th>
                <th scope="col">DDV %</th>
                <th scope="col">Vrednost</th>
                <th class="actions-column" scope="col">Dejanje</th>
              </tr>
            </thead>
            <tbody id="items-body"></tbody>
          </table>
        </div>

        <div class="bottom-grid">
          <div class="notes card">
            <label>
              Namen / dogodek
              <input id="event" />
            </label>
            <label>
              Embalaža / gajbice
              <input id="crates" />
            </label>
            <label>
              Opomba
              <textarea id="note" rows="3"></textarea>
            </label>
          </div>

          <section class="totals card" aria-label="Seštevek dobavnice">
            <div>
              <span>Skupaj brez DDV</span>
              <strong id="subtotal">0,00 €</strong>
            </div>
            <div>
              <span>DDV</span>
              <strong id="vat-total">0,00 €</strong>
            </div>
            <div class="grand-total">
              <span>Skupaj za plačilo</span>
              <strong id="grand-total">0,00 €</strong>
            </div>
          </section>
        </div>

        <div class="signatures">
          <p>Izdal/a: <span></span></p>
          <p>Prejel/a: <span></span></p>
        </div>

        <footer class="document-footer">
          <span id="footer-company"></span>
          <span>info@e-branjevka.si</span>
          <span>www.e-branjevka.si</span>
        </footer>
      </section>
    </main>

    <template id="item-row-template">
      <tr>
        <td class="row-number"></td>
        <td><input class="item-code" aria-label="EAN ali šifra" /></td>
        <td><input class="item-name" aria-label="Naziv postavke" /></td>
        <td>
          <input class="item-quantity number-input" type="number" min="0" step="0.01" />
        </td>
        <td>
          <input class="item-price number-input" type="number" min="0" step="0.01" />
        </td>
        <td>
          <input class="item-vat number-input" type="number" min="0" step="0.01" />
        </td>
        <td class="item-total money">0,00 €</td>
        <td class="actions-column">
          <button class="icon-button remove-item" type="button" aria-label="Odstrani postavko">
            Odstrani
          </button>
        </td>
      </tr>
    </template>

    <div id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
