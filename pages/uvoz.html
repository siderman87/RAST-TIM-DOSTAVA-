<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uvoz TRIS Excel</title>
<link rel="stylesheet" href="../css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>
<div class="container">
  <h1>📦 Uvoz TRIS Excel</h1>

  <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">

  <button onclick="preberiExcel()">Naloži Excel</button>

  <p id="info"></p>

  <div id="rezultat"></div>

  <a class="btn" href="dostave.html">Poglej dostave</a>
  <a class="btn" href="admin.html">Nazaj v admin</a>
</div>

<script>
function preberiExcel() {
  const file = document.getElementById("excelFile").files[0];

  if (!file) {
    alert("Najprej izberi Excel datoteko.");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: "array" });
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];

      const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

json.forEach(d => {
  d.voznik = "";
  d.Status = "Pripravljeno";
  d.cas_spremembe = "";
});

localStorage.removeItem("dostave");
localStorage.setItem("dostave", JSON.stringify(json));

      document.getElementById("info").innerText =
        "Uvoženih vrstic: " + json.length;

      let html = "";

      json.forEach(vrstica => {
        html += `
          <div class="delivery">
            <h3>${vrstica["Stranka"] || "Brez stranke"}</h3>
            <p><b>Lokacija:</b> ${vrstica["Lokacija dostave"] || ""}</p>
            <p><b>Vrednost:</b> ${vrstica["Vrednost"] || ""}</p>
            <p><b>Status:</b> Pripravljeno</p>
          </div>
        `;
      });

      document.getElementById("rezultat").innerHTML = html;

      alert("Excel je uspešno uvožen.");
    } catch (err) {
      alert("Napaka pri uvozu Excela.");
      console.error(err);
    }
  };

  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
