<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uvoz TRIS Excel</title>

<link rel="stylesheet" href="../css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="container">

<h1>📦 Uvoz TRIS Excel</h1>

<input type="file" id="excelFile" accept=".xlsx,.xls,.csv">

<button onclick="preberiExcel()">Naloži Excel</button>

<p id="info"></p>

<a class="btn" href="dostave.html">Poglej dostave</a>
<a class="btn" href="admin.html">Nazaj v admin</a>

</div>

<script>

function preberiExcel() {

  const file = document.getElementById("excelFile").files[0];

  if (!file) {
    alert("Najprej izberi Excel datoteko.");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {

    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    let noveDostave = XLSX.utils.sheet_to_json(sheet, { defval: "" });

    noveDostave = noveDostave.map(d => {
      return {
        ...d,
        voznik: "",
        Status: "Pripravljeno",
        cas_spremembe: ""
      };
    });

    let stareDostave = JSON.parse(localStorage.getItem("dostave")) || [];

    let vseDostave = [
      ...stareDostave,
      ...noveDostave
    ];

    localStorage.setItem("dostave", JSON.stringify(vseDostave));

    document.getElementById("info").innerText =
      "Dodane nove dostave: " + noveDostave.length +
      " | Skupaj dostav: " + vseDostave.length;

    alert("Excel je uvožen. Stare dostave so ostale shranjene.");

  };

  reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
