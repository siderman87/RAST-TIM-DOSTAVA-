<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dostave</title>
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
<div class="container">
  <h1>🚚 Razporejanje dostav</h1>

  <div id="seznam"></div>

  <a class="btn" href="admin.html">Nazaj v admin</a>
</div>

<script>
let dostave = JSON.parse(localStorage.getItem("dostave")) || [];

function prikaziDostave() {
  const seznam = document.getElementById("seznam");

  if (dostave.length === 0) {
    seznam.innerHTML = "<p>Ni uvoženih dostav. Najprej uvozi Excel.</p>";
    return;
  }

  let html = "";

  dostave.forEach((d, index) => {
    html += `
      <div class="delivery">
        <h3>${d["Stranka"] || "Brez stranke"}</h3>

        <p><b>Lokacija:</b> ${d["Lokacija dostave"] || ""}</p>
        <p><b>Vrednost:</b> ${d["Vrednost"] || ""}</p>
        <p><b>Status:</b> ${d["Status"] || "Pripravljeno"}</p>
<p><b>Voznik:</b> ${d["voznik"] || "Ni dodeljen"}</p>
<p><b>Čas spremembe:</b> ${d["cas_spremembe"] || "-"}</p>

        <button onclick="dodeli(${index}, 'ROK')">Dodeli ROK</button>
        <button onclick="dodeli(${index}, 'ANŽE')">Dodeli ANŽE</button>
        <button onclick="dodeli(${index}, 'BLAŽ')">Dodeli BLAŽ</button>
        <button onclick="dodeli(${index}, 'AJDIN')">Dodeli AJDIN</button>
        <button onclick="dodeli(${index}, 'MATEVŽ')">Dodeli MATEVŽ</button>
      </div>
    `;
  });

  seznam.innerHTML = html;
}

function dodeli(index, voznik) {
  dostave[index].voznik = voznik;
  dostave[index].Status = "Pripravljeno";

  localStorage.setItem("dostave", JSON.stringify(dostave));

  alert("Dostava je dodeljena vozniku: " + voznik);

  prikaziDostave();
}

prikaziDostave();
</script>

</body>
</html>
